<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowGrid</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ───────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #00ff88;
      --amber:   #ffaa00;
      --red:     #ff3333;
      --blue:    #00aaff;
      --dim:     rgba(0, 255, 136, 0.15);
      --border:  rgba(0, 255, 136, 0.3);
      --bg:      #000b06;
      --font-mono: 'Share Tech Mono', monospace;
      --font-ui:   'Barlow Condensed', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--green);
      font-family: var(--font-mono);
      cursor: crosshair;
    }

    /* ── Globe Container ────────────────────────── */
    #cesium-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background: #000;
    }

    #cesium-container canvas,
    #cesium-container img,
    #cesium-container video {
      transition: filter 0.22s ease, opacity 0.22s ease, mix-blend-mode 0.22s ease;
    }

    body.mode-nvg #cesium-container {
      background: #3f7e22;
    }
    body.mode-nvg #cesium-container canvas,
    body.mode-nvg #cesium-container img,
    body.mode-nvg #cesium-container video {
      filter: invert(100%) saturate(0%) contrast(1.28) brightness(0.78) blur(0.15px);
      mix-blend-mode: overlay;
      opacity: 0.985;
    }

    body.mode-flir #cesium-container {
      background: #000;
    }
    body.mode-flir #cesium-container canvas,
    body.mode-flir #cesium-container img,
    body.mode-flir #cesium-container video {
      filter: grayscale(100%) saturate(0%) contrast(2.35) brightness(0.96) blur(0.55px);
      mix-blend-mode: normal;
      opacity: 1;
    }

    body.mode-crt #cesium-container {
      background: #08110b;
    }
    body.mode-crt #cesium-container canvas,
    body.mode-crt #cesium-container img,
    body.mode-crt #cesium-container video {
      filter: grayscale(30%) sepia(14%) saturate(85%) contrast(1.14) brightness(0.92);
      mix-blend-mode: screen;
      opacity: 0.96;
    }

    /* Hide Cesium on-screen credit bar to keep HUD clean. */
    .cesium-viewer-bottom,
    .cesium-widget-credits {
      display: none !important;
    }

    /* ── HUD Shell ──────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Corner Brackets — rendered by HUD.js canvas overlay ── */
    /* ── Top Bar — rendered by HUD.js ──────────────────────── */
    /* ── Coords Readout — rendered by HUD.js ───────────────── */
    /* ── Status Bar — rendered by HUD.js ───────────────────── */
    #panel-left {
      position: absolute;
      top: 50%; left: 20px;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: all;
    }

    .layer-btn {
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      backdrop-filter: blur(6px);
      width: 160px;
    }
    .layer-btn .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .layer-btn:hover {
      background: var(--dim);
      border-color: var(--green);
    }
    .layer-btn.active {
      background: var(--dim);
      border-color: var(--green);
    }
    .layer-btn.inactive .dot { background: #333; }
    .layer-btn.inactive { color: #446655; border-color: #1a3328; }

    /* ── Layer Button Collapse Toggle ─────────────────────────────────────────── */
    .layer-btn-header {
      display: flex; align-items: center; gap: 6px; width: 100%;
      cursor: pointer;
    }
    .layer-btn .collapse-chevron {
      display: none;
      font-size: 10px; width: 10px; text-align: center;
      transition: transform 0.2s;
    }
    .layer-btn.has-filters .collapse-chevron {
      display: inline-block;
    }
    .layer-btn.has-filters.collapsed .collapse-chevron {
      transform: rotate(-90deg);
    }

    /* ── Filter Button Containers ─────────────────────────────────────────────── */
    .filter-container {
      display: none;
      flex-direction: row; flex-wrap: wrap; gap: 6px;
      padding-left: 26px; padding-top: 4px;
      margin-top: -4px;
    }
    .filter-container.visible:not(.collapsed) {
      display: flex;
    }

    /* ── Filter Buttons ────────────────────────── */
    .filter-btn {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0, 255, 136, 0.2);
      color: rgba(0, 255, 136, 0.6);
      font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 8px;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
      border-radius: 2px;
      min-width: auto;
      white-space: nowrap;
    }
    .filter-btn:hover {
      background: rgba(0,0,0,0.5);
      border-color: rgba(0, 255, 136, 0.4);
      color: rgba(0, 255, 136, 0.8);
    }
    .filter-btn.active {
      background: rgba(0, 255, 136, 0.2);
      border-color: var(--green);
      color: var(--green);
    }
    .filter-btn.inactive {
      opacity: 0.4;
    }

    /* ── Loading Screen ─────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .load-logo {
      font-family: var(--font-ui);
      font-size: 32px; font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--green);
    }
    .load-bar-wrap {
      width: 240px; height: 2px;
      background: #0a1f14;
      position: relative; overflow: hidden;
    }
    .load-bar {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px var(--green);
    }
    .load-status {
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; opacity: 0.5;
    }

    /* ── Scanline overlay (CRT mode) ────────────── */
    #scanlines {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 5;
      background: repeating-linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.0) 0,
        rgba(0, 0, 0, 0.30) 50%,
        rgba(0, 0, 0, 0.0) 100%
      );
      background-size: auto 4px;
      background-attachment: fixed;
      opacity: 0;
      transition: opacity 0.3s;
      mix-blend-mode: overlay;
    }
    #scanlines::before {
      content: '';
      pointer-events: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(
        0deg,
        transparent 0%,
        rgba(32, 128, 32, 0.20) 2%,
        rgba(32, 128, 32, 0.80) 3%,
        rgba(32, 128, 32, 0.20) 3%,
        transparent 100%
      );
      background-repeat: no-repeat;
      background-attachment: fixed;
      animation: crt-scan 7.5s linear infinite;
      opacity: 0;
      transition: opacity 0.3s;
    }
    body.mode-crt #scanlines { opacity: 0.55; }
    body.mode-crt #scanlines::before { opacity: 0.75; }

    #crt-noise {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 6;
      opacity: 0;
      transition: opacity 0.3s;
      background-image: url('https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif');
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      mix-blend-mode: lighten;
      animation: crt-static 0.24s steps(2) infinite;
    }
    body.mode-crt #crt-noise { opacity: 0.028; }

    #flir-overlay {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 4;
      opacity: 0;
      transition: opacity 0.25s;
      background:
        radial-gradient(ellipse at center, rgba(255,255,255,0.0) 12%, rgba(0,0,0,0.18) 54%, rgba(0,0,0,0.82) 100%),
        repeating-linear-gradient(to bottom, rgba(255,255,255,0) 0px, rgba(255,255,255,0) 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      mix-blend-mode: multiply;
    }
    body.mode-flir #flir-overlay { opacity: 1; }
    #flir-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(to bottom, rgba(255,255,255,0.0) 0px, rgba(255,255,255,0.0) 1px, rgba(255,255,255,0.03) 1px, rgba(255,255,255,0.03) 2px),
        linear-gradient(180deg, rgba(255,255,255,0.0) 0%, rgba(255,255,255,0.08) 48%, rgba(255,255,255,0.0) 100%);
      background-size: auto auto, 100% 140px;
      background-repeat: repeat, no-repeat;
      opacity: 0;
      animation: flir-roll 6.5s linear infinite;
      transition: opacity 0.25s;
    }
    body.mode-flir #flir-overlay::before { opacity: 0.55; }
    #flir-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(255,255,255,0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 75% 40%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
        radial-gradient(circle at 45% 75%, rgba(255,255,255,0.05) 0 1px, transparent 2px);
      background-size: 3px 3px, 5px 5px, 4px 4px;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.25s;
      animation: flir-static 0.16s steps(2) infinite;
    }
    body.mode-flir #flir-overlay::after { opacity: 0.14; }

    @keyframes crt-static {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-1px, 1px); }
      50%  { transform: translate(1px, -1px); }
      75%  { transform: translate(1px, 1px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes nvg-static {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(0.5px, -0.5px); }
      50%  { transform: translate(-0.5px, 0.5px); }
      75%  { transform: translate(0.5px, 0.5px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes flir-static {
      0%   { transform: translate(0, 0); }
      50%  { transform: translate(1px, 0); }
      100% { transform: translate(0, 0); }
    }

    @keyframes flir-roll {
      0% { background-position: 0 0, 0 -140px; }
      100% { background-position: 0 0, 0 calc(100% + 140px); }
    }

    @keyframes crt-scan {
      0% { background-position: 0 -100vh; }
      35%, 100% { background-position: 0 100vh; }
    }

    /* ── NVG tint overlay ───────────────────────── */
    #nvg-overlay {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 4;
      background:
        radial-gradient(circle at center, rgba(166,255,120,0.18) 0%, rgba(112,205,66,0.14) 29%, rgba(0,0,0,0.0) 34%),
        radial-gradient(circle at center, rgba(0,0,0,0.0) 42%, rgba(0,0,0,0.84) 73%, rgba(0,0,0,0.98) 100%);
      opacity: 0;
      transition: opacity 0.3s;
      mix-blend-mode: normal;
    }
    body.mode-nvg #nvg-overlay { opacity: 1; }
    #nvg-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 0 41%, rgba(28, 70, 10, 0.42) 43%, rgba(0,0,0,0.0) 45%),
        radial-gradient(circle at center, rgba(0,0,0,0.0) 0 46%, rgba(0,0,0,0.92) 66%, rgba(0,0,0,1.0) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    body.mode-nvg #nvg-overlay::before { opacity: 1; }
    #nvg-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 39% 34%, rgba(220,255,210,0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 60%, rgba(220,255,210,0.12) 0 1px, transparent 2px),
        radial-gradient(circle at 54% 45%, rgba(220,255,210,0.10) 0 1px, transparent 2px),
        repeating-linear-gradient(to bottom, rgba(255,255,255,0.0) 0px, rgba(255,255,255,0.0) 2px, rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 3px);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.3s;
      animation: nvg-static 0.22s steps(2) infinite;
    }
    body.mode-nvg #nvg-overlay::after { opacity: 0.18; }

    /* ── Pulse animation ────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0.3; }
    }
    .pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="load-logo">ShadowGrid</div>
    <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
    <div class="load-status" id="load-status">Initializing 3D Tiles…</div>
  </div>

  <!-- Globe -->
  <div id="cesium-container"></div>

  <!-- Visual overlays -->
  <div id="scanlines"></div>
  <div id="crt-noise"></div>
  <div id="flir-overlay"></div>
  <div id="nvg-overlay"></div>

  <!-- HUD — dynamic elements injected by HUD.js -->
  <div id="hud">

    <!-- Layer toggles — keep pointer-events for clicks -->
    <div id="panel-left">
      <button class="layer-btn inactive" data-layer="flights" data-has-filters="true">
        <span class="collapse-chevron">▼</span>
        <span class="dot"></span> Air Traffic
      </button>
      <div class="filter-container collapsed" data-filter-group="flights">
        <div style="display: flex; gap: 4px; width: 100%; margin-bottom: 2px;">
          <span style="font-size: 7px; color: rgba(0,255,136,0.4); align-self: center;">Classification:</span>
          <button class="filter-btn active" data-filter="flights-classification:commercial">Commercial</button>
          <button class="filter-btn active" data-filter="flights-classification:military">Military</button>
          <button class="filter-btn active" data-filter="flights-classification:emergency">Emergency</button>
          <button class="filter-btn active" data-filter="flights-classification:ground">On Ground</button>
          <button class="filter-btn active" data-filter="flights-overlay:gps">GPS</button>
          <button class="filter-btn active" data-filter="flights-overlay:airspace">Airspace</button>
        </div>
      </div>

      <button class="layer-btn inactive" data-layer="satellites" data-has-filters="true">
        <span class="collapse-chevron">▼</span>
        <span class="dot"></span> Satellites
      </button>
      <div class="filter-container collapsed" data-filter-group="satellites">
        <button class="filter-btn active" data-filter="satellites:internet">Internet</button>
        <button class="filter-btn active" data-filter="satellites:communications">Communications</button>
        <button class="filter-btn active" data-filter="satellites:earth_observation">Earth Obs</button>
        <button class="filter-btn active" data-filter="satellites:navigation">Navigation</button>
        <button class="filter-btn active" data-filter="satellites:military">Military</button>
        <button class="filter-btn active" data-filter="satellites:weather">Weather</button>
        <button class="filter-btn active" data-filter="satellites:scientific">Scientific</button>
        <button class="filter-btn active" data-filter="satellites:rocket">Rocket</button>
        <button class="filter-btn active" data-filter="satellites:debris">Debris</button>
        <button class="filter-btn active" data-filter="satellites:other">Other</button>
      </div>

      <button class="layer-btn inactive" data-layer="traffic">
        <span class="dot"></span> Street Flow
      </button>
      <button class="layer-btn inactive" data-layer="cctv">
        <span class="dot"></span> CCTV Feeds
      </button>
      <button class="layer-btn inactive" data-layer="internet">
        <span class="dot"></span> Internet
      </button>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
